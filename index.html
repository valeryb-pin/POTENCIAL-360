  .nav-label{padding:6px 18px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-radius:0;transition:all .15s;font-size:13px;font-weight:500;color:var(--text2);border-left:3px solid transparent}
  .nav-item:hover{background:var(--v4);color:var(--v)}
  .nav-item.active{background:var(--v4);color:var(--v);border-left-color:var(--v);font-weight:600}
  .nav-icon{font-size:16px;width:18px;text-align:center}

  .avatar-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--coral));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0}
  .user-info-sm{font-size:12px}
  .user-info-sm strong{display:block;font-weight:600;color:var(--text)}
  .user-info-sm span{color:var(--text3)}
  .role-switch{width:100%;margin-top:10px;padding:7px;background:var(--v3);color:var(--v);border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

  /* MAIN */
  .main{margin-left:var(--sidebar);flex:1;padding:0}
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .topbar-title{font-size:16px;font-weight:700;color:var(--text)}
  .topbar-actions{display:flex;align-items:center;gap:12px}

  .icon-btn:hover{background:var(--v4);color:var(--v)}
  .content{padding:24px 28px;max-width:1100px}

  /* CARDS */

  .hero-sub{font-size:13px;opacity:.85;margin-bottom:20px}

  .stat-delta{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
  .delta-up{background:#D1FAE5;color:#065F46}
  .delta-down{background:#FEE2E2;color:#991B1B}

  /* MISSION CARDS */

  .mission-card{border-radius:16px;padding:18px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}

  .mission-card.active{border-color:var(--v)}

  .m-title{font-size:15px;font-weight:700;margin-bottom:4px}
  .m-desc{font-size:12px;opacity:.75;line-height:1.5;margin-bottom:12px}
  .m-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}

  .journal-date{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600}
  .mood-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .mood-tag{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .journal-text{font-size:13px;color:var(--text2);line-height:1.6}
  .meter-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .meter-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0}
  .meter-bar{flex:1;height:6px;background:var(--border);border-radius:10px;overflow:hidden}
  .meter-fill{height:100%;border-radius:10px}

  .goal-title{font-size:14px;font-weight:700;margin-bottom:3px}
  .goal-meta{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .goal-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .goal-progress-outer{height:6px;background:var(--border);border-radius:10px;overflow:hidden}
  .goal-progress-inner{height:100%;border-radius:10px;transition:width .4s}
  .goal-pct{font-size:12px;font-weight:700;color:var(--text2);margin-top:4px}

  .radar-legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
  .legend-dot{width:8px;height:8px;border-radius:50%}

  .student-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}

  .student-meta{font-size:12px;color:var(--text2)}

  .badge-amber{background:#FEF3C7;color:#92400E}
  .badge-red{background:#FEE2E2;color:#991B1B}

  .section-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
  .section-sub{font-size:13px;color:var(--text2);margin-bottom:16px}

  /* FORMS */
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block}
  .form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--card)}
  .form-input:focus{border-color:var(--v);box-shadow:0 0 0 3px var(--v3)}
  .form-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--card);resize:vertical;min-height:80px}
  .form-textarea:focus{border-color:var(--v);box-shadow:0 0 0 3px var(--v3)}
  .btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
  .btn-primary{background:var(--v);color:#fff}
  .btn-primary:hover{background:#5a32a8}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
  .btn-ghost:hover{background:var(--v4);color:var(--v)}

  /* ASSESSMENT CARD */
  .assess-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
  .assess-title{font-size:14px;font-weight:700;margin-bottom:3px}
  .assess-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
  .score-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .score-label{font-size:12px;color:var(--text2);width:100px;flex-shrink:0}
  .score-track{flex:1;height:8px;background:var(--border);border-radius:10px;overflow:hidden}
  .score-fill{height:100%;border-radius:10px}
  .score-num{font-size:12px;font-weight:700;width:30px;text-align:right}

  /* TABS */
  .tabs{display:flex;gap:4px;background:var(--v4);border-radius:12px;padding:4px;margin-bottom:20px}
  .tab{padding:7px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:transparent;font-family:inherit}
  .tab.active{background:var(--card);color:var(--v);box-shadow:0 1px 4px rgba(0,0,0,.1)}

  /* EMPTY STATE */
  .empty{text-align:center;padding:40px 20px;color:var(--text2)}
  .empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
  .empty-text{font-size:13px;line-height:1.6}

  /* PAGE TRANSITIONS */
  .page{animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* CHARTS CONTAINER */
  .chart-wrap{position:relative;width:100%;height:200px}
  .chart-wrap-lg{position:relative;width:100%;height:280px}

  /* RADAR SVG */
  svg.radar{overflow:visible}

  /* NOTIFICATION DOT */
  .notif-dot{width:6px;height:6px;background:var(--coral);border-radius:50%;margin-left:auto}

  /* QUICK ACTIONS */
  .quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .quick-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
  .quick-btn:hover{background:var(--v4);color:var(--v);border-color:var(--v)}
  .quick-btn .qi{font-size:16px}

  /* MOBILE RESPONSIVE */
  @media(max-width:720px){
    :root{--sidebar:0px}
    .sidebar{display:none}
    .main{margin-left:0}
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
    .mission-grid{grid-template-columns:1fr}
    .content{padding:16px}
  }

async function login(){

  const correo =
    document.getElementById("correo").value;

  const password =
    document.getElementById("password").value;

  const { data, error } =
    await supabaseClient.auth.signInWithPassword({
      email: correo,
      password: password
    });

  if(error){
    alert("Usuario o contraseña incorrectos");
    console.error(error);
    return;
  }

  const perfil = await cargarPerfil();
  
  if(!perfil){
    alert("No existe un perfil para este usuario.");
    return;
  }

    
  window.CURRENT_USER = {
    nombre: perfil.nombre_completo,
    email: perfil.correo,
    rol: perfil.rol,
    colegio: perfil.colegio,
    id: perfil.id
  };
  
  STATE.goals = await cargarMetas();
  STATE.reflexions = await cargarReflexiones();
  STATE.perfil = await cargarPerfilPsicologico();

  console.log("CURRENT_USER DESPUES:", window.CURRENT_USER);
  console.log("PERFIL PSICOLÓGICO:", STATE.perfil);
  render();

}

async function cargarPerfil() {

  const { data: { user } } =
    await supabaseClient.auth.getUser();

  const { data, error } =
    await supabaseClient
      .from("estudiantes")
      .select("*")
      .eq("correo", user.email)
      .single();

  if(error){

      console.error(error);

      return null;

  }

  return data;

}
async function cargarPerfilPsicologico() {

  const { data, error } =
    await supabaseClient
      .from("perfiles")
      .select("*")
      .eq("estudiante_id", window.CURRENT_USER.id)
      .single();

  if(error){
    console.error(error);
    return null;
  }

  return data;
}

async function cargarMetas() {

  const { data, error } =
    await supabaseClient
      .from("metas")
      .select("*")
      .eq("estudiante_id", window.CURRENT_USER.id);

  if(error){
    console.error(error);
    return [];
  }
  return data.map(m => ({
   id: m.id,
   title: m.titulo,
   priority: m.prioridad,
   progress: m.progreso,
   status: m.estado,
   due: m.fecha_limite,
   cat: m.categoria
  }));
}

async function cargarReflexiones() {

  const { data, error } =
    await supabaseClient
      .from("reflexiones")
      .select("*")
      .eq("estudiante_id", window.CURRENT_USER.id);

  if(error){
    console.error(error);
    return [];
  }
  return data.map(r => ({
   id: r.id,
   date: r.fecha,
   mood: r.estado_animo,
   energy: r.nivel_energia,
   motivation: r.nivel_motivacion,
   learning: r.aprendizaje_semanal,
   challenges: r.desafios,
   insights: r.descubrimiento_personal,
   actions: r.proximas_acciones
  }));
}

async function logout() {

  await supabaseClient.auth.signOut();

  window.CURRENT_USER = null;

  location.reload();

}

async function verificarSesion() {
  console.log("VERIFICANDO SESION");
  const { data: { session } } =
    await supabaseClient.auth.getSession();
  console.log("SESSION:", session);
  if(session){

    const perfil = await cargarPerfil();
      if(!perfil){
        console.error(
          "No se encontró perfil para:",
          session.user.email
        );
       return;
      }

    window.CURRENT_USER = {
      nombre: perfil.nombre_completo,
      email: perfil.correo,
      rol: perfil.rol,
      colegio: perfil.colegio
    };
    STATE.reflexions= await cargarReflexiones();
    STATE.metas = await cargarMetas();

    STATE.perfil = await cargarPerfilPsicologico();

    console.log("PERFIL:", STATE.perfil);
    render();

  } else {

    document.getElementById("content")
      .innerHTML = pageLogin();

  }

}

function switchTab(el,tabId){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['timeline','new'].forEach(id=>{
    const el=document.getElementById('tab-'+id);
    if(el) el.style.display=id===tabId?'block':'none';
  });
}

function switchTabById(tabId){
  const tabs=document.querySelectorAll('.tab');
  const ids=['timeline','new'];
  tabs.forEach((t,i)=>{t.classList.toggle('active',ids[i]===tabId)});
  ids.forEach(id=>{
    const el=document.getElementById('tab-'+id);
    if(el) el.style.display=id===tabId?'block':'none';
  });
}
